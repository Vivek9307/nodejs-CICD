name: Main Branch CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Create Deployment Package
        run: |
          mkdir blog

          cp -r .next blog/
          cp -r public blog/ || true
          cp package.json blog/
          cp package-lock.json blog/ || true
          cp next.config.js blog/ || true

          tar -czvf blog.tar.gz blog

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: blog.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Configure SSH Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy Artifact to EC2
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no \
          blog.tar.gz ubuntu@13.235.243.90:/home/ubuntu/

      - name: Deploy on Server
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@13.235.243.90 << 'EOF'
            sudo mkdir -p /home/ubuntu/apps

            cd /home/ubuntu/apps

            rm -rf blog

            tar -xzvf /home/ubuntu/blog.tar.gz

            cd blog

            npm ci --production

            pm2 delete blog || true

            pm2 start npm --name "blog" -- start

            pm2 save

          EOF

name: Blog Node.js CI/CD Pipelines

on:
  push:
    branches:
      - main

jobs:
  build:
    name: 🔨 Build Application
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code from repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # Step 3: Install project dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Build the Next.js application
      - name: Build Application
        run: npm run build

  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Step 1: Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js and install dependencies + build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      # Step 3: Copy project files to EC2 via SCP
      - name: Deploy Files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.EC2_USER }}/blog-nodejs-app"
          overwrite: true

      # Step 4: Install dependencies on EC2 and restart the app with PM2
      - name: Install & Restart on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /home/${{ secrets.EC2_USER }}/blog-nodejs-app

            # Install production dependencies only
            npm ci --production

            # Restart the app using PM2 (process manager)
            # If the app is already running, reload it; otherwise start it
            if pm2 describe blog-app > /dev/null 2>&1; then
              echo "♻️ Reloading existing PM2 process..."
              pm2 reload blog-app
            else
              echo "🚀 Starting new PM2 process..."
              pm2 start server.js --name blog-app --env production
              pm2 save
            fi

            echo "✅ Deployment complete!"